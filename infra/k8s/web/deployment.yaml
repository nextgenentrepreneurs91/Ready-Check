
# infra/k8s/web/deployment.yaml
```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: readycheck-web
  labels:
    app: readycheck
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: readycheck
      component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: readycheck
        component: web
    spec:
      containers:
        - name: web
          image: readycheck-web:latest # Typically replaced by CI/CD tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.readycheck.org/api/v1" # Production API endpoint
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
```
